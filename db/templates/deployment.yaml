apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-deployment
  namespace: {{ .Values.namespace }}
  labels:
    namespace: {{ .Values.namespace }}
    repo: {{ .Values.name }}
    ##----
    environment: {{ .Values.metadata.environment }}
    owner: {{ .Values.metadata.owner }}
    commit: {{ .Values.metadata.commit }}

spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.container.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.container.port }}
      env:
        - name: POSTGRES_DB
          value: {{ .Values.database.name }}
        - name: POSTGRES_USER
          value: {{ .Values.database.user }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.database.password }}
          resources:
            limits:
              cpu: "1"
              memory: "500Mi"
            requests:
              cpu: "0.5"
              memory: "250Mi"

          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d

      volumes:
        - name: initdb
          configMap:
            name: {{ .Values.name }}-initdb 