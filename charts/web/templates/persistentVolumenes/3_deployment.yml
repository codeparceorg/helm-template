apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{.Values.name}}-deployment"
  namespace: {{.Release.Namespace }}
spec:
  replicas: {{.Values.replicaCount}}
  selector:
    matchLabels:
      app: {{.Values.name}}
  template:
    metadata:
      labels:
        app: {{.Values.name}}
    spec:
      containers:
        - name: {{.Values.name}}
          image: "{{.Values.image.repository}}:{{.Values.image.tag}}"
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "0.5"
              memory: "1Gi"      
            requests:
              cpu: "0.2"
              memory: "500Mi"
          volumeMounts:
            - name: "{{.Values.name}}-config-vol"
              mountPath: "/mnt/{{.Values.name}}"

              
      volumes:
        - name: "{{.Values.name}}-config-vol"
          persistentVolumeClaim:
            claimName: "{{.Values.name}}-config-pvc"
