{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}

  labels:
    namespace: {{ .Values.namespace }}
    repo: {{ .Values.name }}

    environment: {{ .Values.metadata.environment }}
    owner: {{ .Values.metadata.owner }}
    commit: {{ .Values.metadata.commit }}

spec:
  replicas: 2
  strategy:
    canary:
      maxSurge: 2
      maxUnavailable: 0
      stableService: {{ .Values.name }}-svc
      #canaryService: {{ .Values.name }}-canary-svc

      #trafficRouting:
       # traefik:
        #  weightedTraefikServiceName: {{ .Values.name }}
      #scaleDownDelaySeconds: 10
      steps:
      - setWeight: 20
      - pause: {}

      - setWeight: 30
      - pause:
          duration: 20s

      - setWeight: 40
      - pause:
          duration: 10s

      - setWeight: 60
      - pause:
          duration: 10s

      - setWeight: 100
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}

    spec:
      imagePullSecrets:
      - name: ghcr-secret

      containers:
      - name: {{ .Values.name }}
        image: {{ .Values.container.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.container.port }}
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 300m
            memory: 256Mi


{{- end }}